<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Bird - Vibe Music Edition</title>
    <!-- Ďîäęëţ÷ŕĺě áčáëčîňĺęó Adsgram -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #020208;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 0 40px rgba(127, 0, 255, 0.4);
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 2, 15, 0.75);
            backdrop-filter: blur(3px);
            transition: opacity 0.2s ease;
            z-index: 10;
        }

        h1 {
            color: #00ffff;
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 15px #7f00ff, 0 0 30px #00ffff;
            letter-spacing: 4px;
            font-weight: 900;
        }

        p {
            color: #b3a0cd;
            margin-bottom: 25px;
            font-size: 0.95rem;
            text-align: center;
            padding: 0 30px;
            line-height: 1.4;
        }

        .btn {
            padding: 12px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff007f;
            transition: transform 0.1s, box-shadow 0.2s;
            letter-spacing: 1px;
            z-index: 20;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #7f00ff;
        }

        #score-container {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        #score-display {
            color: #fff;
            font-size: 2.8rem;
            font-weight: bold;
            text-shadow: 0 0 12px #00ffff;
            font-family: monospace;
            display: none;
        }

        #multiplier-badge {
            background: #00ff66;
            color: #000;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 5px;
            box-shadow: 0 0 15px #00ff66;
            display: none;
            letter-spacing: 1px;
        }

        .hide {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="score-container">
            <div id="score-display">0</div>
            <div id="multiplier-badge">2X POINTS ACTIVE</div>
        </div>

        <div id="main-menu" class="overlay">
            <h1>GALAXY VIBE</h1>
            <p>Catch the rhythm. Collect 2X chips (30%) before 100 points. No back-to-back spawns.</p>
            <button class="btn" onclick="startGame(event)">FLY</button>
        </div>

        <div id="game-over" class="overlay hide">
            <h1 style="color: #ff007f; text-shadow: 0 0 15px #ff007f;">SESSION END</h1>
            <p id="final-score" style="color: #00ffff; font-size: 1.2rem;"></p>
            <button class="btn" onclick="resetGame(event)">RESTART</button>
        </div>
    </div>

    <script>
        // Íŕńňđîéęŕ đĺęëŕěű Adsgram
        const AdController = window.Adsgram.init({ blockId: "35654" });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mainMenu = document.getElementById('main-menu');
        const gameOverScreen = document.getElementById('game-over');
        const scoreDisplay = document.getElementById('score-display');
        const multiplierBadge = document.getElementById('multiplier-badge');
        const finalScore = document.getElementById('final-score');

        let gameState = 'MENU'; 
        let score = 0;
        let animationFrameId;

        const GRAVITY = 0.25;
        const JUMP = -5.5;
        const PIPE_SPEED = 2.5;
        const PIPE_SPAWN_RATE = 90; 
        const GAP_SIZE = 150; 

        let rocket;
        let pipes = [];
        let stars = [];
        let nebulaClouds = [];
        let chips = [];
        let frameCount = 0;
        
        let doublePointsTimer = 0; 
        let isDoublePoints = false;
        let chipsSpawnedThisRun = 0; 
        let wasLastPipeAChip = false; 

        function initGalaxyBackground() {
            stars = [];
            nebulaClouds = [];
            
            for (let i = 0; i < 5; i++) {
                nebulaClouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 80 + 60,
                    color: i % 2 === 0 ? 'rgba(127, 0, 255, 0.04)' : 'rgba(255, 0, 127, 0.03)',
                    speed: Math.random() * 0.1 + 0.05
                });
            }

            for (let i = 0; i < 70; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.4 + 0.1,
                    pulseSpeed: Math.random() * 0.03 + 0.01,
                    phase: Math.random() * Math.PI
                });
            }
        }

        class Rocket {
            constructor() {
                this.x = 80;
                this.y = 280;
                this.velocity = 0;
                this.radius = 14;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                let angle = Math.min(Math.max(this.velocity * 0.07, -0.5), 0.5);
                if (gameState === 'READY') angle = 0;
                ctx.rotate(angle);

                if (isDoublePoints) {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#00ff66';
                } else {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00ffff';
                }

                if (gameState === 'PLAYING') {
                    ctx.fillStyle = isDoublePoints ? '#00ff66' : (Math.random() > 0.5 ? '#ff007f' : '#ffaa00');
                    ctx.beginPath();
                    ctx.moveTo(-15, 0);
                    ctx.lineTo(-28 - Math.random() * 12, -4);
                    ctx.lineTo(-28 - Math.random() * 12, 4);
                    ctx.fill();
                }

                ctx.fillStyle = isDoublePoints ? '#b3ffcc' : '#00ffff';
                ctx.beginPath();
                ctx.ellipse(0, 0, 18, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(6, -2, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = isDoublePoints ? '#00cc44' : '#7f00ff';
                ctx.fillRect(-12, -12, 6, 4);
                ctx.fillRect(-12, 8, 6, 4);

                ctx.restore();
            }

            update() {
                this.velocity += GRAVITY;
                this.y += this.velocity;

                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    endGame();
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            }

            jump() {
                this.velocity = JUMP;
            }
        }

        class Pipe {
            constructor() {
                this.x = canvas.width;
                this.topHeight = Math.floor(Math.random() * (canvas.height - GAP_SIZE - 120)) + 60;
                this.bottomY = this.topHeight + GAP_SIZE;
                this.width = 60;
                this.passed = false;
            }

            draw() {
                let gradient = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
                gradient.addColorStop(0, '#4d0099');
                gradient.addColorStop(0.5, '#990066');
                gradient.addColorStop(1, '#4d0099');

                ctx.fillStyle = gradient;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 0, 127, 0.4)';

                ctx.fillRect(this.x, 0, this.width, this.topHeight);
                ctx.fillRect(this.x, this.bottomY, this.width, canvas.height - this.bottomY);
                ctx.shadowBlur = 0;
            }

            update() {
                this.x -= PIPE_SPEED;
            }

            collidesWith(bird) {
                if (bird.x + bird.radius > this.x && bird.x - bird.radius < this.x + this.width) {
                    if (bird.y - bird.radius < this.topHeight || bird.y + bird.radius > this.bottomY) {
                        return true;
                    }
                }
                return false;
            }
        }

        class Chip {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 12;
                this.alive = true;
            }

            draw() {
                if (!this.alive) return;
                ctx.save();
                
                let floatY = this.y + Math.sin(Date.now() * 0.008) * 5;

                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ff66';
                
                ctx.fillStyle = '#00ff66';
                ctx.beginPath();
                ctx.arc(this.x, floatY, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#05020f';
                ctx.beginPath();
                ctx.arc(this.x, floatY, this.radius - 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 9px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('2X', this.x, floatY);

                ctx.restore();
            }

            update() {
                this.x -= PIPE_SPEED;
            }

            collidesWith(bird) {
                if (!this.alive) return false;
                let floatY = this.y + Math.sin(Date.now() * 0.008) * 5;
                let dist = Math.hypot(bird.x - this.x, bird.y - floatY);
                return dist < bird.radius + this.radius;
            }
        }

        function drawBackground() {
            let pulse = Math.sin(Date.now() * 0.001) * 0.05;
            let bgGrad = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 10,
                canvas.width / 2, canvas.height / 2, canvas.height
            );
            bgGrad.addColorStop(0, '#21003f');
            bgGrad.addColorStop(0.6 + pulse, '#0a031c');
            bgGrad.addColorStop(1, '#030107');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            nebulaClouds.forEach(cloud => {
                ctx.fillStyle = cloud.color;
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.radius, 0, Math.PI * 2);
                ctx.fill();

                if (gameState === 'PLAYING') {
                    cloud.x -= cloud.speed;
                    if (cloud.x + cloud.radius < 0) cloud.x = canvas.width + cloud.radius;
                }
            });

            stars.forEach(star => {
                star.phase += star.pulseSpeed;
                let alpha = 0.3 + Math.abs(Math.sin(star.phase)) * 0.7;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);

                if (gameState === 'PLAYING') {
                    star.x -= star.speed;
                    if (star.x < 0) {
                        star.x = canvas.width;
                        star.y = Math.random() * canvas.height;
                    }
                }
            });
        }

        function gameLoop() {
            cancelAnimationFrame(animationFrameId);
            drawBackground();

            if (gameState === 'PLAYING') {
                frameCount++;

                if (isDoublePoints) {
                    doublePointsTimer--;
                    if (doublePointsTimer <= 0) {
                        isDoublePoints = false;
                        multiplierBadge.style.display = 'none';
                    }
                }

                if (score >= 100 && chips.length > 0) {
                    chips = [];
                }

                if (frameCount % PIPE_SPAWN_RATE === 0) {
                    let newPipe = new Pipe();
                    pipes.push(newPipe);

                    if (score < 100) {
                        let allowedToSpawn = !wasLastPipeAChip;
                        let shouldSpawn = allowedToSpawn && ((score === 15 && chipsSpawnedThisRun === 0) || (Math.random() < 0.30));
                        
                        if (shouldSpawn) {
                            let midY = newPipe.topHeight + (GAP_SIZE / 2);
                            chips.push(new Chip(newPipe.x + 30, midY));
                            chipsSpawnedThisRun++;
                            wasLastPipeAChip = true; 
                        } else {
                            wasLastPipeAChip = false; 
                        }
                    }
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].update();
                    pipes[i].draw();

                    if (pipes[i].collidesWith(rocket)) {
                        endGame();
                        return;
                    }

                    if (!pipes[i].passed && pipes[i].x + pipes[i].width < rocket.x) {
                        score += isDoublePoints ? 2 : 1;
                        scoreDisplay.innerText = score;
                        pipes[i].passed = true;
                    }

                    if (pipes[i].x + pipes[i].width < 0) pipes.splice(i, 1);
                }

                for (let i = chips.length - 1; i >= 0; i--) {
                    chips[i].update();
                    chips[i].draw();

                    if (chips[i].collidesWith(rocket)) {
                        chips[i].alive = false;
                        isDoublePoints = true;
                        doublePointsTimer = 300; 
                        multiplierBadge.style.display = 'block';
                        chips.splice(i, 1);
                        continue;
                    }

                    if (chips[i].x + chips[i].radius < 0) chips.splice(i, 1);
                }

                rocket.update();
            } else if (gameState === 'READY') {
                rocket.y = 280 + Math.sin(Date.now() * 0.004) * 6;
                ctx.fillStyle = '#b3a0cd';
                ctx.font = 'bold 13px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.letterSpacing = '2px';
                ctx.fillText('TAP TO ENTER THE FLOW', canvas.width / 2, canvas.height / 2 + 60);
            }

            rocket.draw();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function triggerJump(e) {
            if (gameState === 'MENU' || gameState === 'GAMEOVER') return;

            if (gameState === 'READY') gameState = 'PLAYING';
            rocket.jump();
            if (e && e.cancelable) e.preventDefault();
        }

        function handleKeyDown(e) {
            if (e.code === 'Space') triggerJump(e);
        }

        function startGame(e) {
            if (e) e.stopPropagation();
            mainMenu.classList.add('hide');
            scoreDisplay.style.display = 'block';
            gameState = 'READY';
        }

        // Âűçîâ ďîęŕçŕ đĺęëŕěű ďđč çŕâĺđřĺíčč čăđű
        function endGame() {
            gameState = 'GAMEOVER';
            cancelAnimationFrame(animationFrameId);
            multiplierBadge.style.display = 'none';
            
            // Çŕďóńęŕĺě đĺęëŕěó Adsgram
            AdController.show().then(() => {
                // Âűçîâĺňń˙, ĺńëč đĺęëŕěŕ ďîęŕçŕíŕ óńďĺříî
                showGameOverScreen();
            }).catch((err) => {
                // Âűçîâĺňń˙, ĺńëč đĺęëŕěŕ íĺ çŕăđóçčëŕńü čëč ďđîčçîřëŕ îřčáęŕ
                console.log("Ad error or skipped:", err);
                showGameOverScreen();
            });
        }

        function showGameOverScreen() {
            finalScore.innerText = "Score: " + score;
            gameOverScreen.classList.remove('hide');
        }

        function resetGame(e) {
            if (e) e.stopPropagation();
            cancelAnimationFrame(animationFrameId); 
            pipes = [];
            chips = [];
            score = 0;
            frameCount = 0;
            isDoublePoints = false;
            doublePointsTimer = 0;
            chipsSpawnedThisRun = 0; 
            wasLastPipeAChip = false; 
            scoreDisplay.innerText = '0';
            multiplierBadge.style.display = 'none';
            rocket = new Rocket();
            gameOverScreen.classList.add('hide');
            gameState = 'READY';
            gameLoop(); 
        }

        window.addEventListener('keydown', handleKeyDown);
        canvas.addEventListener('touchstart', triggerJump, { passive: false });
        canvas.addEventListener('mousedown', triggerJump);

        initGalaxyBackground();
        rocket = new Rocket();
        gameLoop();
    </script>
</body>
</html>
